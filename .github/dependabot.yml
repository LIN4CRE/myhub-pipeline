version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    rebase-strategy: "rebase"
    reviewers:
      - "LIN4CRE"
    assignees:
      - "LIN4CRE"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    rebase-strategy: "rebase"
    reviewers:
      - "LIN4CRE"
    labels:
      - "ci"
      - "automated"
    # Dependabot will auto-pin actions to commit SHAs on next update run
