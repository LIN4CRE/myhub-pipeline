version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    rebase-strategy: "rebase"
    reviewers: ["LIN4CRE"]
    labels: ["dependencies","automated"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    rebase-strategy: "rebase"
    reviewers: ["LIN4CRE"]
    labels: ["ci","automated"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
