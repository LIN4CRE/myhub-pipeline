name: Webhook Event Relay

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed, reopened, synchronize]
  release:
    types: [published, created]
  issues:
    types: [opened, closed, labeled]

concurrency:
  group: webhook-relay-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  relay:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name != 'push'
    steps:
      - uses: actions/checkout@v7
      - name: Log webhook event
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME:   ${{ github.event_name }}
          ACTOR:        ${{ github.actor }}
          REF:          ${{ github.ref }}
          RUN_ID:       ${{ github.run_id }}
        run: |
          python - <<'PYEOF'
          import json, os, datetime, base64, requests
          token = os.environ.get("GITHUB_TOKEN","")
          repo  = os.environ.get("GITHUB_REPOSITORY","")
          hdrs  = {"Accept":"application/vnd.github+json",
                   "Authorization":f"Bearer {token}",
                   "X-GitHub-Api-Version":"2022-11-28"}
          url   = f"https://api.github.com/repos/{repo}/contents/webhook_events.json"
          r     = requests.get(url,headers=hdrs,timeout=10)
          data  = json.loads(base64.b64decode(r.json()["content"]).decode()) if r.status_code==200 else []
          sha   = r.json().get("sha") if r.status_code==200 else None
          data.append({"timestamp":datetime.datetime.utcnow().isoformat()+"Z",
                        "event":os.environ.get("EVENT_NAME",""),
                        "actor":os.environ.get("ACTOR",""),
                        "ref":os.environ.get("REF",""),
                        "run_id":os.environ.get("RUN_ID",""),
                        "repo":repo})
          data=data[-50:]
          body={"message":f"chore: log webhook [skip ci]",
                "content":base64.b64encode(json.dumps(data,indent=2).encode()).decode(),
                "branch":"main"}
          if sha: body["sha"]=sha
          requests.put(url,headers=hdrs,json=body,timeout=15)
          PYEOF
