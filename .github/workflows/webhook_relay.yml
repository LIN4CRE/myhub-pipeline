name: Webhook Event Relay

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, closed, reopened, synchronize]
  release:
    types: [published, created]
  issues:
    types: [opened, closed, labeled]

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log webhook event
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'EOF'
          import json, os, datetime, base64, requests

          event_name = os.environ.get("EVENT_NAME", "unknown")
          actor      = os.environ.get("ACTOR", "unknown")
          ref        = os.environ.get("REF", "")
          run_id     = os.environ.get("RUN_ID", "")
          token      = os.environ.get("GITHUB_TOKEN", "")
          repo       = os.environ.get("GITHUB_REPOSITORY", "")
          timestamp  = datetime.datetime.utcnow().isoformat() + "Z"

          headers = {
            "Accept": "application/vnd.github+json",
            "Authorization": f"Bearer {token}",
            "X-GitHub-Api-Version": "2022-11-28",
          }

          # Fetch existing events
          url = f"https://api.github.com/repos/{repo}/contents/webhook_events.json"
          r   = requests.get(url, headers=headers, timeout=10)
          if r.status_code == 200:
              data  = json.loads(base64.b64decode(r.json()["content"]).decode())
              sha   = r.json()["sha"]
          else:
              data = []
              sha  = None

          # Append new event
          data.append({
            "timestamp":  timestamp,
            "event":      event_name,
            "actor":      actor,
            "ref":        ref,
            "run_id":     run_id,
            "repo":       repo,
          })
          data = data[-50:]  # keep last 50

          # Push back
          body = {
            "message": f"chore: log webhook event {event_name} [skip ci]",
            "content": base64.b64encode(json.dumps(data, indent=2).encode()).decode(),
            "branch":  "main",
          }
          if sha:
              body["sha"] = sha
          requests.put(url, headers=headers, json=body, timeout=15)
          print(f"Logged event: {event_name} by {actor} at {timestamp}")
          EOF
